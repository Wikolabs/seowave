name: Deploy seowave

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/wikolabs/seowave:latest .
          docker push ghcr.io/wikolabs/seowave:latest

      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VM_USER@$VM_HOST"             "echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin             && docker pull ghcr.io/wikolabs/seowave:latest             && (docker stop seowave 2>/dev/null; docker rm seowave 2>/dev/null; true)             && docker run -d --name seowave -p 3027:3000 --restart unless-stopped ghcr.io/wikolabs/seowave:latest             && echo 'Deployed seowave on port 3027'"
